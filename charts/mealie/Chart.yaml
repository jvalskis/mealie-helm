apiVersion: v2
appVersion: v3.16.0
description: Mealie is a self hosted recipe manager and meal planner with a RestAPI backend and a reactive frontend application built in Vue for a pleasant user experience for the whole family.
name: mealie
version: 3.0.2
kubeVersion: ">=1.16.0-0"
keywords:
  - mealie
sources:
  - https://github.com/mealie-recipes/mealie
dependencies:
  - name: common
    version: 4.6.2
    repository: https://bjw-s-labs.github.io/helm-charts/
  - name: postgresql
    version: 15.5.21
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: cluster
    version: 0.6.0
    repository: https://cloudnative-pg.github.io/charts
    condition: cluster.enabled