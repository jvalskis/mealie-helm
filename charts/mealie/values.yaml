#
# IMPORTANT NOTE
#
# This chart inherits from the bjw-s library chart. You can check the default values/options here:
# https://github.com/bjw-s-labs/helm-charts/tree/main/charts/library/common
#
strategy:
  type: Recreate

controllers:
  main:
    enabled: true
    containers:
      main:
        image:
          # -- image repository
          repository: ghcr.io/mealie-recipes/mealie
          # -- image tag
          # @default -- chart.appVersion
          tag:
          # -- image pull policy
          pullPolicy: IfNotPresent
        # -- environment variables.
        # @default -- See below
        env:
          TZ: UTC
          DB_ENGINE: '{{ if or .Values.cluster.enabled .Values.postgresql.enabled }}postgres{{ else }}sqlite{{ end }}'
          POSTGRES_SERVER: '{{ if .Values.cluster.enabled }}{{ printf "%s-cluster-rw" .Release.Name }}{{ else if .Values.postgresql.enabled }}{{ printf "%s-postgresql" .Release.Name }}{{ end }}'
          POSTGRES_PORT: "5432"
          POSTGRES_DB: mealie
          POSTGRES_USER:
            valueFrom:
              secretKeyRef:
                name: '{{ include "mealie.dbCredentialsSecretName" . }}'
                key: username
                optional: true
          POSTGRES_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: '{{ include "mealie.dbCredentialsSecretName" . }}'
                key: password
                optional: true

# -- Configures service settings for the chart. Normally this does not need to be modified.
# @default -- See values.yaml
service:
  main:
    controller: main
    ports:
      http:
        port: 9000

ingress:
  # -- Enable and configure ingress settings for the chart under this key.
  # @default -- See values.yaml
  main:
    enabled: false

# -- Configure persistence settings for the chart under this key.
# @default -- See values.yaml
persistence:
  data:
    enabled: true
    accessMode: ReadWriteOnce
    size: 10Gi
    advancedMounts:
      main: # the controller with the "main" identifier
        main: # the container with the "main" identifier
          - path: /app/data/
            readOnly: false

# https://github.com/bitnami/charts/tree/master/bitnami/postgresql/#installing-the-chart
postgresql:
  enabled: false
#  auth:
#    postgresPassword: ""
#    username: ""
#    password: ""
#    database: ""
  persistence:
    enabled: true
    storageClass:
    accessModes:
      - ReadWriteOnce

# Credentials for the database.
# If both username and password are set, a Kubernetes Secret is created automatically.
# The generated secret name follows the pattern: <fullname>-db-credentials.
# Designed for use with SOPS or Vault encrypted values files.
credentials:
  username: ""
  password: ""

# https://github.com/cloudnative-pg/charts/tree/main/charts/cluster
# Requires the CloudNativePG operator to be installed in the cluster.
# When enabled, DB_ENGINE and POSTGRES_SERVER are set automatically.
cluster:
  enabled: false
  type: postgresql
  mode: standalone
  version:
    postgresql: "16"
  cluster:
    instances: 1
    storage:
      size: 10Gi
    walStorage:
      enabled: true
      size: 2Gi
    initdb:
      database: mealie
      owner: mealie
      # secret:
      #   name: ""  # set to <fullname>-db-credentials when using the credentials section above
